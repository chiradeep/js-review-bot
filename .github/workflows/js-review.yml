name: JS Review Bot

on:
  workflow_call:
    inputs:
      bot_mention:
        description: "Bot mention used in PR comments."
        required: false
        type: string
        default: "@js-review-bot"
      config_path:
        description: "Path to per-repo config."
        required: false
        type: string
        default: ".github/js-review.toml"
      default_model:
        description: "Default Codex model."
        required: false
        type: string
        default: "gpt-5.5"
      default_effort:
        description: "Default Codex reasoning effort."
        required: false
        type: string
        default: "medium"
      auto_review_enabled:
        description: "Run automatic review on pull_request events."
        required: false
        type: boolean
        default: true
    secrets:
      OPENAI_API_KEY:
        required: true
      JS_REVIEW_BOT_APP_ID:
        required: true
      JS_REVIEW_BOT_PRIVATE_KEY:
        required: true

jobs:
  js-review:
    name: Run js-review-bot
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
      issues: read
      checks: read
      actions: read
    steps:
      - name: Gate event
        id: gate
        uses: chiradeep/js-review-bot/.github/actions/js-review@main
        with:
          command: gate
          token: ${{ github.token }}
          bot-mention: ${{ inputs.bot_mention }}
          auto-review-enabled: ${{ inputs.auto_review_enabled }}

      - name: Create GitHub App token
        id: app-token
        if: steps.gate.outputs.should_run == 'true'
        uses: chiradeep/js-review-bot/.github/actions/js-review@main
        env:
          JS_REVIEW_APP_ID: ${{ secrets.JS_REVIEW_BOT_APP_ID }}
          JS_REVIEW_PRIVATE_KEY: ${{ secrets.JS_REVIEW_BOT_PRIVATE_KEY }}
          JS_REVIEW_TOKEN_OWNER: ${{ steps.gate.outputs.repo_owner }}
          JS_REVIEW_TOKEN_REPOSITORY: ${{ steps.gate.outputs.repo_name }}
        with:
          command: app-token

      - name: Checkout target repository
        if: steps.gate.outputs.should_run == 'true'
        uses: actions/checkout@v5
        with:
          token: ${{ steps.app-token.outputs.token }}
          ref: ${{ steps.gate.outputs.checkout_ref }}
          fetch-depth: 0
          persist-credentials: false

      - name: Fetch PR refs
        if: steps.gate.outputs.should_run == 'true'
        env:
          APP_TOKEN: ${{ steps.app-token.outputs.token }}
          PR_NUMBER: ${{ steps.gate.outputs.pr_number }}
          BASE_REF: ${{ steps.gate.outputs.base_ref }}
        run: |
          set -euo pipefail
          AUTH_HEADER="$(printf 'x-access-token:%s' "$APP_TOKEN" | base64 | tr -d '\n')"
          git -c "http.https://github.com/.extraheader=AUTHORIZATION: basic ${AUTH_HEADER}" \
            fetch --no-tags origin \
            "+refs/heads/$BASE_REF:refs/remotes/origin/$BASE_REF" \
            "+refs/pull/$PR_NUMBER/head:refs/remotes/pull/$PR_NUMBER/head"

      - name: Prepare Codex run
        id: context
        if: steps.gate.outputs.should_run == 'true'
        uses: chiradeep/js-review-bot/.github/actions/js-review@main
        env:
          GATE_COMMAND: ${{ steps.gate.outputs.command }}
          GATE_IS_COMMAND: ${{ steps.gate.outputs.is_command }}
          GATE_PR_NUMBER: ${{ steps.gate.outputs.pr_number }}
          GATE_REPO_OWNER: ${{ steps.gate.outputs.repo_owner }}
          GATE_REPO_NAME: ${{ steps.gate.outputs.repo_name }}
          GATE_REPO_FULL_NAME: ${{ steps.gate.outputs.repo_full_name }}
          GATE_BASE_REF: ${{ steps.gate.outputs.base_ref }}
          GATE_HEAD_REF: ${{ steps.gate.outputs.head_ref }}
          GATE_BASE_SHA: ${{ steps.gate.outputs.base_sha }}
          GATE_HEAD_SHA: ${{ steps.gate.outputs.head_sha }}
          GATE_ACTOR: ${{ steps.gate.outputs.actor }}
        with:
          command: prepare-run
          token: ${{ steps.app-token.outputs.token }}
          config-path: ${{ inputs.config_path }}
          default-model: ${{ inputs.default_model }}
          default-effort: ${{ inputs.default_effort }}

      - name: Checkout OpenAI skills
        if: steps.context.outputs.should_continue == 'true' && steps.context.outputs.needs_openai_skills == 'true'
        uses: actions/checkout@v5
        with:
          repository: openai/skills
          ref: main
          path: .js-review/extensions/openai-skills
          persist-credentials: false

      - name: Checkout OpenAI plugins
        if: steps.context.outputs.should_continue == 'true' && steps.context.outputs.needs_openai_plugins == 'true'
        uses: actions/checkout@v5
        with:
          repository: openai/plugins
          ref: main
          path: .js-review/extensions/openai-plugins
          persist-credentials: false

      - name: Install configured skills and plugins
        if: steps.context.outputs.should_continue == 'true'
        uses: chiradeep/js-review-bot/.github/actions/js-review@main
        with:
          command: install-extensions

      - name: Log js-review context
        if: steps.context.outputs.should_continue == 'true'
        uses: chiradeep/js-review-bot/.github/actions/js-review@main
        with:
          command: log-context

      - name: Collect failed CI context
        if: steps.context.outputs.should_continue == 'true' && steps.gate.outputs.command == 'fix-ci'
        uses: chiradeep/js-review-bot/.github/actions/js-review@main
        with:
          command: collect-ci
          token: ${{ steps.app-token.outputs.token }}

      - name: Run Codex
        if: steps.context.outputs.should_continue == 'true'
        id: run_codex
        uses: openai/codex-action@v1
        with:
          openai-api-key: ${{ secrets.OPENAI_API_KEY }}
          sandbox: ${{ steps.context.outputs.sandbox }}
          safety-strategy: drop-sudo
          prompt-file: .js-review/generated/prompt.md
          output-file: .js-review/generated/codex-output.json
          output-schema-file: .js-review/generated/review-output.schema.json
          model: ${{ steps.context.outputs.model }}
          effort: ${{ steps.context.outputs.effort }}
          codex-home: ${{ github.workspace }}/.js-review/codex-home

      - name: Commit and push fix-ci changes
        if: steps.context.outputs.should_continue == 'true' && steps.gate.outputs.command == 'fix-ci'
        id: commit_fix
        uses: chiradeep/js-review-bot/.github/actions/js-review@main
        with:
          command: commit-fix
          token: ${{ steps.app-token.outputs.token }}

      - name: Post PR review
        if: always() && steps.context.outputs.should_continue == 'true'
        uses: chiradeep/js-review-bot/.github/actions/js-review@main
        with:
          command: post-review
          token: ${{ steps.app-token.outputs.token }}

      - name: Upload js-review diagnostics
        if: always() && steps.context.outputs.should_continue == 'true'
        uses: actions/upload-artifact@v7
        with:
          name: js-review-${{ steps.gate.outputs.command }}-pr-${{ steps.gate.outputs.pr_number }}-${{ github.run_id }}
          path: |
            .js-review/generated/run.json
            .js-review/generated/prompt.md
            .js-review/generated/review-output.schema.json
            .js-review/generated/codex-output.json
            .js-review/generated/ci-context.md
          if-no-files-found: ignore
          include-hidden-files: true
          retention-days: 7

      - name: Revoke GitHub App token
        if: always() && steps.app-token.outputs.token != ''
        uses: chiradeep/js-review-bot/.github/actions/js-review@main
        with:
          command: revoke-app-token
          token: ${{ steps.app-token.outputs.token }}
